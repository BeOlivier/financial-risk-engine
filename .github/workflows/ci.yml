name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundation:
    name: Foundation check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Confirm workflow execution
        run: |
          echo "GitHub Actions is working."
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch or ref: $GITHUB_REF"
          pwd
          ls -la
